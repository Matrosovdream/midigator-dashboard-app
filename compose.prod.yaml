services:
  web:
    build:
      context: .
      dockerfile: ./docker/production/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - midigator-storage-production:/var/www/storage:ro
      - midigator-public-assets:/var/www/public/build:ro
    networks:
      - midigator-production
      - traefik-network
    depends_on:
      php-fpm:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.midigator.rule=Host(`midigator.devflip.io`)"
      - "traefik.http.routers.midigator.entrypoints=websecure"
      - "traefik.http.routers.midigator.tls.certresolver=letsencrypt"
      - "traefik.http.services.midigator.loadbalancer.server.port=80"

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - midigator-public-assets:/var/www/public/build
      - midigator-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - midigator-production
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - midigator-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - midigator-production
    depends_on:
      php-fpm:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: ["php", "artisan", "horizon"]
    stop_signal: SIGTERM
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  reverb:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - midigator-production
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: []
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY}
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data-production:/meili_data
    networks:
      - midigator-production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - midigator-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - midigator-production
    depends_on:
      php-fpm:
        condition: service_healthy
    entrypoint: []
    command: ["php", "artisan", "schedule:work"]

  postgres:
    image: postgres:16
    restart: unless-stopped
    user: postgres
    environment:
      - POSTGRES_DB=${DB_DATABASE:-midigator}
      - POSTGRES_USER=${DB_USERNAME:-midigator}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - postgres-data-production:/var/lib/postgresql/data
    networks:
      - midigator-production
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - midigator-production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  midigator-production:
    driver: bridge
  traefik-network:
    external: true


volumes:
  postgres-data-production:
  midigator-storage-production:
  midigator-public-assets:
  meilisearch-data-production:
